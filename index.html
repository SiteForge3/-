<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>3D Geometric Aura · Modern Visual</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Inter', 'Segoe UI', 'PingFang SC', 'Roboto', 'Helvetica Neue', sans-serif;
      background-color: #050a14;
    }
    
    /* Noise overlay and radial gradient background */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(10, 20, 40, 0.8), rgba(0, 0, 0, 0.95));
      z-index: -2;
      pointer-events: none;
    }
    
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
      z-index: -1;
      pointer-events: none;
    }

    .info {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      letter-spacing: 1px;
      font-weight: 400;
      backdrop-filter: blur(8px);
      background: rgba(0, 0, 0, 0.3);
      width: fit-content;
      margin: 0 auto;
      padding: 8px 20px;
      border-radius: 40px;
      z-index: 10;
      font-family: monospace;
      border: 1px solid rgba(255, 255, 255, 0.15);
      pointer-events: none;
    }

    .info a {
      color: #88ccff;
      text-decoration: none;
      pointer-events: auto;
      transition: color 0.3s;
    }

    .info a:hover {
      color: #fff;
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .info {
        font-size: 10px;
        bottom: 16px;
        padding: 6px 16px;
      }
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: monospace;
      background: rgba(0, 0, 0, 0.6);
      padding: 12px 24px;
      border-radius: 30px;
      z-index: 100;
      backdrop-filter: blur(5px);
      transition: opacity 1s;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="info">
    ✦ 3D Geometric Aura ✦ | <span style="color:#88ccff">Drag to rotate view</span> | Inspired Iteration · Refreshed Presentation
  </div>
  <div id="loading">Loading visual engine...</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.128.0",
        "three/addons/": "https://esm.sh/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // ------------------------------------------------------------
    // 1. Scene, Camera, Renderer setup
    // ------------------------------------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050a14); // deep dark blue base
    scene.fog = new THREE.FogExp2(0x050a14, 0.008);
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(3, 2, 5);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: false,
      powerPreference: "high-performance"
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // cap for performance
    renderer.toneMapping = THREE.ReinhardToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);
    
    // Post processing
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
    bloomPass.threshold = 0.1;
    bloomPass.strength = 0.8;
    bloomPass.radius = 0.5;
    
    const effectComposer = new EffectComposer(renderer);
    effectComposer.addPass(renderScene);
    effectComposer.addPass(bloomPass);
    
    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.2;
    controls.enableZoom = true;
    controls.enablePan = false;
    controls.zoomSpeed = 1.0;
    controls.rotateSpeed = 1.0;
    controls.target.set(0, 0, 0);
    controls.update();
    
    // ------------------------------------------------------------
    // 2. Lighting
    // ------------------------------------------------------------
    const ambientLight = new THREE.AmbientLight(0x222244);
    scene.add(ambientLight);
    
    const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
    mainLight.position.set(2, 3, 4);
    scene.add(mainLight);
    
    const backLight = new THREE.PointLight(0x446688, 0.6);
    backLight.position.set(-2, 1, -3);
    scene.add(backLight);
    
    const fillLight = new THREE.PointLight(0xffaa88, 0.5);
    fillLight.position.set(1.5, 1, 2);
    scene.add(fillLight);
    
    // Dynamic color light
    const colorLight = new THREE.PointLight(0xff4488, 0.8);
    colorLight.position.set(1, 1, 2);
    scene.add(colorLight);
    
    // ------------------------------------------------------------
    // 3. Background stars
    // ------------------------------------------------------------
    const starGeometry = new THREE.BufferGeometry();
    const starCount = 800;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount * 3; i += 3) {
      starPositions[i] = 200 * (Math.random() - 0.5);
      starPositions[i+1] = 100 * (Math.random() - 0.5);
      starPositions[i+2] = 80 * (Math.random() - 0.5) - 40;
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMaterial = new THREE.PointsMaterial({
      color: 0xaaccff,
      size: 0.08,
      transparent: true,
      opacity: 0.6
    });
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);
    
    // ------------------------------------------------------------
    // 4. Core geometric shape (Icosahedron with wireframe)
    // ------------------------------------------------------------
    const geometryIco = new THREE.IcosahedronGeometry(1.1, 0);
    const materialMain = new THREE.MeshStandardMaterial({
      color: 0x4a7a8c,
      emissive: 0x112233,
      roughness: 0.28,
      metalness: 0.75,
      flatShading: false,
      transparent: true,
      opacity: 0.92
    });
    const coreMesh = new THREE.Mesh(geometryIco, materialMain);
    scene.add(coreMesh);
    
    const wireframeMat = new THREE.MeshBasicMaterial({
      color: 0x66aacc,
      wireframe: true,
      transparent: true,
      opacity: 0.25
    });
    const wireframeIco = new THREE.Mesh(geometryIco, wireframeMat);
    wireframeIco.scale.setScalar(1.08);
    scene.add(wireframeIco);
    
    // ------------------------------------------------------------
    // 5. Dynamic particle ring (orbiting particles with colors)
    // ------------------------------------------------------------
    const ringParticleCount = 1200;
    const ringGeometry = new THREE.BufferGeometry();
    const ringPositions = new Float32Array(ringParticleCount * 3);
    const ringColors = new Float32Array(ringParticleCount * 3);
    
    for (let i = 0; i < ringParticleCount; i++) {
      const t = (i / ringParticleCount) * Math.PI * 2;
      const radius = 1.55;
      const x = Math.cos(t) * radius;
      const z = Math.sin(t) * radius;
      const y = 0.35 * Math.sin(3 * t);
      
      ringPositions[i * 3] = x;
      ringPositions[i * 3 + 1] = y;
      ringPositions[i * 3 + 2] = z;
      
      // Color variation based on angle
      ringColors[i * 3] = 0.4 + 0.6 * Math.sin(t);
      ringColors[i * 3 + 1] = 0.3 + 0.7 * Math.cos(1.7 * t);
      ringColors[i * 3 + 2] = 0.8 + 0.2 * Math.sin(2.3 * t);
    }
    ringGeometry.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
    ringGeometry.setAttribute('color', new THREE.BufferAttribute(ringColors, 3));
    
    const ringMaterial = new THREE.PointsMaterial({
      size: 0.05,
      vertexColors: true,
      transparent: true,
      blending: THREE.AdditiveBlending
    });
    const ringParticles = new THREE.Points(ringGeometry, ringMaterial);
    scene.add(ringParticles);
    
    // ------------------------------------------------------------
    // 6. Torus rings (solid metallic rings)
    // ------------------------------------------------------------
    const torusMat = new THREE.MeshStandardMaterial({
      color: 0x88aacc,
      emissive: 0x223344,
      roughness: 0.3,
      metalness: 0.9
    });
    const torusRing = new THREE.Mesh(
      new THREE.TorusGeometry(1.45, 0.045, 64, 500),
      torusMat
    );
    scene.add(torusRing);
    
    const torusRing2 = new THREE.Mesh(
      new THREE.TorusGeometry(1.68, 0.03, 64, 500),
      new THREE.MeshStandardMaterial({
        color: 0xffaa88,
        emissive: 0x442211,
        roughness: 0.5,
        metalness: 0.7
      })
    );
    scene.add(torusRing2);
    
    // ------------------------------------------------------------
    // 7. Ambient floating particles (cloud)
    // ------------------------------------------------------------
    const cloudParticleCount = 800;
    const cloudGeo = new THREE.BufferGeometry();
    const cloudPositions = new Float32Array(cloudParticleCount * 3);
    for (let i = 0; i < cloudParticleCount * 3; i += 3) {
      cloudPositions[i] = 5 * (Math.random() - 0.5);
      cloudPositions[i+1] = 3 * (Math.random() - 0.5);
      cloudPositions[i+2] = 4 * (Math.random() - 0.5) - 1;
    }
    cloudGeo.setAttribute('position', new THREE.BufferAttribute(cloudPositions, 3));
    const cloudMat = new THREE.PointsMaterial({
      color: 0x7788aa,
      size: 0.025,
      transparent: true,
      opacity: 0.4,
      blending: THREE.AdditiveBlending
    });
    const cloudPoints = new THREE.Points(cloudGeo, cloudMat);
    scene.add(cloudPoints);
    
    // ------------------------------------------------------------
    // 8. Subtle grid helper
    // ------------------------------------------------------------
    const gridHelper = new THREE.GridHelper(12, 24, 0x88aacc, 0x334455);
    gridHelper.position.y = -1.8;
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.2;
    scene.add(gridHelper);
    
    // ------------------------------------------------------------
    // 9. Loading screen removal
    // ------------------------------------------------------------
    setTimeout(() => {
      const loadingEl = document.getElementById('loading');
      if (loadingEl) {
        loadingEl.style.opacity = '0';
        setTimeout(() => {
          if (loadingEl) loadingEl.remove();
        }, 1000);
      }
    }, 500);
    
    // ------------------------------------------------------------
    // 10. Animation loop
    // ------------------------------------------------------------
    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      
      time += 0.012;
      
      // Rotate core and wireframe
      coreMesh.rotation.y = 0.25 * time;
      coreMesh.rotation.x = 0.2 * Math.sin(0.37 * time);
      coreMesh.rotation.z = 0.15 * Math.cos(0.23 * time);
      wireframeIco.rotation.copy(coreMesh.rotation);
      
      // Rotate particle ring
      ringParticles.rotation.y = 0.35 * time;
      ringParticles.rotation.x = 0.2 * Math.sin(0.28 * time);
      
      // Rotate torus rings
      torusRing.rotation.x = Math.PI / 2;
      torusRing.rotation.z = 0.5 * time;
      
      torusRing2.rotation.x = Math.PI / 2 + 0.3;
      torusRing2.rotation.z = 0.65 * time;
      
      // Dynamic color light
      const hue = (0.55 + 0.1 * Math.sin(0.2 * time)) % 1.0;
      colorLight.color.setHSL(hue, 1, 0.6);
      
      // Subtle movement for background elements
      stars.rotation.y += 0.0005;
      stars.rotation.x += 0.0003;
      
      cloudPoints.rotation.y = 0.05 * time;
      cloudPoints.rotation.x = 0.1 * Math.sin(0.1 * time);
      
      // Update controls and renderc
      controls.update();
      effectComposer.render();
    }
    
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      effectComposer.setSize(window.innerWidth, window.innerHeight);
    }
    
    window.addEventListener('resize', onWindowResize, false);
    
    // Start animation
    animate();
    
    console.log('3D Scene Ready | Modern Visual');
  </script>
</body>
</html>
